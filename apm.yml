name: ai-nixcfg
version: 1.0.0
description: Nix flake for AI coding assistant configs (Claude Code, Codex, Copilot, Gemini, OpenCode, OpenClaw, Crush)
author: DivitMittal
license: MIT
target:
  - claude
  - codex
  - opencode
type: instructions

dependencies:
  mcp:
    - name: serena
      registry: false
      transport: stdio
      command: uvx
      args:
        - --from
        - git+https://github.com/oraios/serena
        - serena
        - start-mcp-server
        - --context
        - claude-code
        - --project
        - ~/Projects/Cfgs/ai-nixCfg/
    - name: nixos
      registry: false
      transport: stdio
      command: uvx
      args:
        - mcp-nixos
