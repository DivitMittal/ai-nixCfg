[gowa]
src.github = "aldinokemal/go-whatsapp-web-multidevice"
fetch.github = "aldinokemal/go-whatsapp-web-multidevice"
fetch.go = "github.com/aldinokemal/go-whatsapp-web-multidevice"

# Lightpanda — prebuilt nightly binaries, one entry per target platform.
# Run `pkgs-update` to re-hash when the nightly binary changes.
# Version tracks the latest HEAD commit of the upstream repo.
[lightpanda-x86_64-linux]
src.git = "https://github.com/lightpanda-io/browser"
fetch.url = "https://github.com/lightpanda-io/browser/releases/download/nightly/lightpanda-x86_64-linux"

[lightpanda-aarch64-linux]
src.git = "https://github.com/lightpanda-io/browser"
fetch.url = "https://github.com/lightpanda-io/browser/releases/download/nightly/lightpanda-aarch64-linux"

[lightpanda-x86_64-darwin]
src.git = "https://github.com/lightpanda-io/browser"
fetch.url = "https://github.com/lightpanda-io/browser/releases/download/nightly/lightpanda-x86_64-macos"

[lightpanda-aarch64-darwin]
